<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🔺 TKE 🔺 Masters Pool 2026</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

.hero{
  background:#173b2c;
  color:#fff;
  text-align:center;
  padding:30px;
  border-bottom:2px solid #000;
}
.hero h1{margin:0;font-size:32px;}

.container{
  max-width:1100px;
  margin:20px auto;
  padding:0 10px;
}

/* LEADERBOARD */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border:2px solid #000;
}
th{
  background:#173b2c;
  color:#fff;
  padding:10px;
}
td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

/* Highlight ONLY participant cell */
.place-1 td:first-child{
  background:gold;
  font-weight:700;
}
.place-2 td:first-child{
  background:#d9d9d9;
}
.place-3 td:first-child{
  background:#cd7f32;
}

/* PARTICIPANT CARD */
.card{
  background:#fff;
  border:2px solid #000;
  margin-top:20px;
  border-radius:10px;
  overflow:hidden;
}

.card-header{
  background:#173b2c;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.score{
  text-align:right;
}
.score .main{
  font-size:28px;
  font-weight:700;
}
.score .sub{
  font-size:14px;
}

.under{color:#00ff90;}
.over{color:#ffb3b3;}
.even{color:#fff;}

.meta{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  background:#eee;
  text-align:center;
}
.meta div{padding:10px;}

.small-table{
  width:100%;
}
.small-table th{
  background:#eee;
  color:#000;
}
.small-table td{
  border-bottom:1px solid #eee;
}

.score-under{color:green;}
.score-over{color:red;}
.score-even{color:black;}
</style>
</head>

<body>

<div class="hero">
  <h1>🔺 TKE 🔺 Masters Pool 2026</h1>
</div>

<div class="container">

  <table>
    <thead>
      <tr>
        <th>Participant</th>
        <th>R1</th>
        <th>R2</th>
        <th>R3</th>
        <th>R4</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="leaderboard"></tbody>
  </table>

  <div id="cards"></div>

</div>

<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycbwbqpGDuDYHy34TMxDbbSM37w0yFvClWmejrJGgMnCpTAPJfW1FaawDet29-WIVgSWpiw/exec";

function parseNum(v){ return Number(v)||0; }

function parsePar(v){
  if(!v || v==="—" || v==="MC") return 999;
  if(v==="E") return 0;
  return Number(v.replace("+",""));
}

/* 🔥 FIXED LOGIC */
function calcTop6(participant){
  const sorted = participant.golfers
    .slice()
    .sort((a,b)=>parseNum(a.total)-parseNum(b.total))
    .slice(0,6);

  let total = 0;

  sorted.forEach(g=>{
    if(g.status==="Missed Cut"){
      if(parseNum(g.r3)===82) total+=10;
      if(parseNum(g.r4)===82) total+=10;
    } else {
      const val = parsePar(g.to_par);
      if(val<900) total+=val;
    }
  });

  return total;
}

function parFormat(v){
  if(v===0) return "E";
  if(v>0) return "+"+v;
  return v;
}

function parClass(v){
  if(v<0) return "under";
  if(v>0) return "over";
  return "even";
}

async function load(){
  const res = await fetch(DATA_URL);
  const data = await res.json();

  const map = {};

  data.forEach(r=>{
    if(!map[r.participant]){
      map[r.participant]={
        name:r.participant,
        r1:r.r1p,
        r2:r.r2p,
        r3:r.r3p,
        r4:r.r4p,
        total:r.totalp,
        golfers:[]
      };
    }

    map[r.participant].golfers.push({
      name:r.golfer,
      to_par:r.to_par,
      status:r.status,
      r1:r.r1,
      r2:r.r2,
      r3:r.r3,
      r4:r.r4,
      total:r.total
    });
  });

  const players = Object.values(map).sort((a,b)=>a.total-b.total);

  /* LEADERBOARD */
  document.getElementById("leaderboard").innerHTML =
    players.map((p,i)=>{
      let cls = i===0?"place-1":i===1?"place-2":i===2?"place-3":"";
      return `<tr class="${cls}">
        <td>${p.name}</td>
        <td>${p.r1}</td>
        <td>${p.r2}</td>
        <td>${p.r3}</td>
        <td>${p.r4}</td>
        <td>${p.total}</td>
      </tr>`;
    }).join("");

  /* CARDS */
  document.getElementById("cards").innerHTML =
    players.map(p=>{
      const t6 = calcTop6(p);

      return `
      <div class="card">
        <div class="card-header">
          <div>${p.name}</div>
          <div class="score">
            <div class="main">${p.total}</div>
            <div class="sub ${parClass(t6)}">Top 6: ${parFormat(t6)}</div>
          </div>
        </div>

        <div class="meta">
          <div>R1 ${p.r1}</div>
          <div>R2 ${p.r2}</div>
          <div>R3 ${p.r3}</div>
          <div>R4 ${p.r4}</div>
        </div>

        <table class="small-table">
          <tr>
            <th>Golfer</th>
            <th>R1</th>
            <th>R2</th>
            <th>R3</th>
            <th>R4</th>
            <th>Score</th>
          </tr>

          ${p.golfers.map(g=>`
            <tr>
              <td>${g.name}</td>
              <td>${g.r1||"-"}</td>
              <td>${g.r2||"-"}</td>
              <td>${g.r3||"-"}</td>
              <td>${g.r4||"-"}</td>
              <td class="${g.to_par<0?"score-under":g.to_par>0?"score-over":"score-even"}">
                ${g.to_par}
              </td>
            </tr>
          `).join("")}
        </table>
      </div>
      `;
    }).join("");
}

load();
setInterval(load,30000);
</script>

</body>
</html>
